name: ansible-lint

on:
  push:
    branches: [main]
    paths:
      - "Ansible/**"
      - ".github/workflows/ansible-lint.yml"
  pull_request:
    paths:
      - "Ansible/**"
      - ".github/workflows/ansible-lint.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install 'ansible-core>=2.16,<2.19' 'ansible-lint==25.*' yamllint
          ansible-galaxy collection install ansible.windows community.windows community.general

      - name: yamllint
        working-directory: Ansible
        run: yamllint .

      - name: ansible-lint
        working-directory: Ansible
        # Config partagée avec le Makefile (.yamllint + .ansible-lint) pour
        # éviter la divergence « vert en local / rouge en CI ». On lint les
        # 3 playbooks racine ; les rôles sont scannés transitivement.
        run: ansible-lint main_*.yml
