name: ansible-lint

on:
  push:
    paths:
      - 'Ansible/**'
      - '.github/workflows/ansible-lint.yml'
  pull_request:
    paths:
      - 'Ansible/**'
      - '.github/workflows/ansible-lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install ansible.windows community.windows community.general

      - name: yamllint
        working-directory: Ansible
        run: yamllint -d "{extends: relaxed, rules: {line-length: disable, indentation: disable}}" .

      - name: ansible-lint
        working-directory: Ansible
        # On lint les playbooks racine ; les rôles sont scannés transitivement.
        run: |
          ansible-lint \
            --offline \
            --exclude inventory/host_vars \
            --exclude inventory/group_vars \
            main_windows_playbook.yml \
            main_linux_playbook.yml \
            main_mac_playbook.yml \
            main_remove_softwares.yml
