---
# Réglages de maintenance disque du CT claude-code (tasks/maintenance.yml).
# Fusionnés dans /etc/docker/daemon.json sans écraser l'existant.
docker_daemon_disk_settings:
  builder:
    gc:
      enabled: true
      defaultKeepStorage: "2GB"
  log-driver: json-file
  log-opts:
    max-size: "10m"
    max-file: "3"
# Plafond des journaux systemd du CT.
ct_journal_max_use: 200M
