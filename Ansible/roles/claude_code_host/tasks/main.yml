---
# Provisionne le CT claude-code EN DIRECT (SSH via ProxyJump), pas via pct exec.
# Prépare l'hôte à recevoir la migration des données + le déploiement du compose.
# Le `docker compose up` final attend la migration des données (cf. MIGRATION-WYSE.md).

- name: Installer les prérequis apt
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - rsync
      - sqlite3
    update_cache: true
    state: present

- name: Créer le répertoire des keyrings apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Récupérer la clé GPG Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Ajouter le dépôt Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Installer Docker CE + plugin compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Docker démarré et activé au boot
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Créer l'arborescence /volume1/Aurelien (mêmes chemins que le NAS → zéro remap)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /volume1/Aurelien/AI/Claude-data
    - /volume1/Aurelien/AI/Claude
    - /volume1/Aurelien/Projects

- name: Vérifier que Docker répond
  ansible.builtin.command: docker version --format '{{ "{{" }}.Server.Version{{ "}}" }}'
  register: docker_version
  changed_when: false

- name: Version de Docker installée
  ansible.builtin.debug:
    msg: "Docker Server {{ docker_version.stdout }} opérationnel dans le CT."
