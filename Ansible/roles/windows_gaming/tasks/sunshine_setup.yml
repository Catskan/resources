---
# Sunshine — self-hosted game streaming server (NVIDIA GameStream-compatible
# protocol, pairs with the Moonlight client family — Steam Deck, iPad,
# Apple TV, Android TV, Chromecast Google TV, browser, etc.). Installed
# by softwares_winget.yml (LizardByte.Sunshine); this task:
#
#   1) Locates sunshine.exe (winget drops it under Program Files\Sunshine)
#   2) Seeds the Web UI admin credentials via the CLI (`--creds`) — sourced
#      from KeePass (entry `ansible/aurelien-gaming/sunshine` with
#      username + password fields)
#   3) Installs the Windows service so Sunshine starts at boot (the
#      installer USUALLY does this, but we re-assert for idempotency)
#   4) Opens the standard Sunshine ports on the Windows firewall, profile
#      `private` only (LAN). NEVER add `public` here — Sunshine's RTSP
#      surface is not designed for raw internet exposure. WAN access
#      should go through Tailscale or similar VPN.
#
# After role run, the user finishes the setup interactively:
#   - Open https://localhost:47990 (or https://<aurel-gaming>:47990 from
#     another LAN device, self-signed cert warning is expected)
#   - Log in with the Sunshine admin creds from KeePass
#   - Pair each Moonlight client by entering the PIN that the client
#     displays into Sunshine's Web UI (one-time per client)
#
# Bare-metal only — gated in main.yml on inventory_hostname=aurelien-gaming
# AND on sunshine_enabled.

- name: Sunshine — install ViGEmBus (virtual gamepad driver for Moonlight controller input)
  # ViGEmBus est un PILOTE : son install winget échoue en contexte WinRM non
  # interactif (exit -1978335212), y compris en runas. Best-effort — on
  # n'interrompt PAS le run et on capture la sortie winget pour diagnostic
  # (voir la tâche debug suivante). Fallback manuel si besoin : installeur
  # Sunshine, ou release GitHub Nefarius.ViGEmBus.
  ansible.windows.win_powershell:
    script: |
      $listed = winget list --id ViGEm.ViGEmBus --exact --disable-interactivity 2>&1 | Out-String
      if ($listed -match 'ViGEm\.ViGEmBus') { $Ansible.Changed = $false; $Ansible.Result = @{ winget_rc = 0; state = 'already-installed' }; return }
      if ($Ansible.CheckMode) { $Ansible.Changed = $true; return }
      $out = (& winget install --id ViGEm.ViGEmBus --exact --silent --accept-package-agreements --accept-source-agreements --disable-interactivity 2>&1 | Out-String)
      $rc = $LASTEXITCODE
      $Ansible.Result = @{ winget_rc = $rc; winget_output = $out }
      $Ansible.Changed = ($rc -eq 0)
  register: vigembus
  failed_when: false
  when: sunshine_install_vigembus | bool

- name: Sunshine — ViGEmBus install diagnostic (only if winget didn't succeed)
  ansible.builtin.debug:
    msg: "ViGEmBus winget rc={{ vigembus.result.winget_rc }} — {{ vigembus.result.winget_output | default('') }}"
  when:
    - sunshine_install_vigembus | bool
    - not (vigembus is skipped)
    - (vigembus.result.winget_rc | default(0)) != 0

- name: Sunshine — install HidHide (hide host-connected controllers from games)
  # Empêche le double-input quand une manette est branchée SUR le PC pendant le
  # streaming (jeux ne voient que le pad virtuel ViGEmBus). Best-effort. Les
  # règles de masquage (quelle manette / quels jeux) se configurent dans l'appli
  # HidHide — Ansible ne fait qu'installer le pilote.
  ansible.windows.win_powershell:
    script: |
      $listed = winget list --id Nefarius.HidHide --exact --disable-interactivity 2>&1 | Out-String
      if ($listed -match 'Nefarius\.HidHide') { $Ansible.Changed = $false; $Ansible.Result = @{ winget_rc = 0; state = 'already-installed' }; return }
      if ($Ansible.CheckMode) { $Ansible.Changed = $true; return }
      $out = (& winget install --id Nefarius.HidHide --exact --silent --accept-package-agreements --accept-source-agreements --disable-interactivity 2>&1 | Out-String)
      $rc = $LASTEXITCODE
      $Ansible.Result = @{ winget_rc = $rc; winget_output = $out }
      $Ansible.Changed = ($rc -eq 0)
  register: hidhide
  failed_when: false
  when: sunshine_install_hidhide | bool

- name: Sunshine — HidHide install diagnostic (only if winget didn't succeed)
  ansible.builtin.debug:
    msg: "HidHide winget rc={{ hidhide.result.winget_rc }} — {{ hidhide.result.winget_output | default('') }}"
  when:
    - sunshine_install_hidhide | bool
    - not (hidhide is skipped)
    - (hidhide.result.winget_rc | default(0)) != 0

- name: Sunshine — locate installed binary
  ansible.windows.win_powershell:
    script: |
      $candidates = @(
        "$env:ProgramFiles\Sunshine\sunshine.exe",
        "${env:ProgramFiles(x86)}\Sunshine\sunshine.exe"
      )
      $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
      if (-not $exe) { throw "sunshine.exe not found — softwares_winget.yml didn't install LizardByte.Sunshine?" }
      $Ansible.Result = @{ path = $exe }
      $Ansible.Changed = $false
  register: sunshine_exe
  changed_when: false
  # Read-only probe — must run in --check too, otherwise the tasks below
  # reference sunshine_exe.result.path on a skipped register.
  check_mode: false

- name: Sunshine — ensure config directory exists
  ansible.windows.win_file:
    path: "{{ sunshine_config_dir }}"
    state: directory

- name: Sunshine — ensure cover-art assets directory exists
  ansible.windows.win_file:
    path: '{{ sunshine_config_dir }}\assets'
    state: directory

- name: Sunshine — download app cover art (apps with image_url)
  ansible.windows.win_get_url:
    url: "{{ item.image_url }}"
    dest: '{{ sunshine_config_dir }}\assets\{{ item.name | regex_replace("[^A-Za-z0-9]+", "_") }}.png'
    force: false
  loop: "{{ sunshine_apps | selectattr('image_url', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Sunshine — deploy sunshine.conf (encoder + LAN restrictions + log level)
  ansible.windows.win_template:
    src: sunshine.conf.j2
    dest: '{{ sunshine_config_dir }}\sunshine.conf'
  register: sunshine_conf

- name: "Sunshine — deploy apps.json (Moonlight library: Desktop + Steam Big Picture + Xbox)"
  ansible.windows.win_template:
    src: sunshine_apps.json.j2
    dest: '{{ sunshine_config_dir }}\apps.json'
  register: sunshine_apps_file

- name: Sunshine — set Web UI admin credentials (from KeePass)
  ansible.windows.win_powershell:
    parameters:
      exe: "{{ sunshine_exe.result.path }}"
      adminUser: "{{ sunshine_admin_user }}"
      adminPw: "{{ sunshine_admin_password }}"
    script: |
      param([string]$exe, [string]$adminUser, [string]$adminPw)
      # --creds rewrites the credentials hash in sunshine.conf. Safe to
      # re-run with the same values — bcrypt produces a fresh hash each
      # time but the resulting "this user/pass authenticates" semantics
      # are identical, so we just mark unchanged.
      & $exe --creds $adminUser $adminPw 2>&1 | Out-Null
      $Ansible.Changed = $false
  no_log: true
  changed_when: false

- name: Sunshine — ensure Windows service is installed
  ansible.windows.win_powershell:
    parameters:
      exe: "{{ sunshine_exe.result.path }}"
    script: |
      param([string]$exe)
      $svc = Get-Service -Name 'SunshineService' -ErrorAction SilentlyContinue
      if (-not $svc) {
        # Fallback if the winget installer didn't register the service.
        # Sunshine ships a helper script in the install dir for this.
        $installScript = Join-Path (Split-Path $exe) 'Sunshine Service Install.bat'
        if (Test-Path $installScript) {
          & cmd.exe /c "`"$installScript`""
          $Ansible.Changed = $true
        } else {
          throw "Sunshine service not installed and 'Sunshine Service Install.bat' missing"
        }
      } else {
        $Ansible.Changed = $false
      }

- name: Sunshine — service delayed auto-start (restart if config changed)
  # Démarrage DIFFÉRÉ : laisse le driver AMD s'initialiser avant Sunshine.
  # Évite la race d'init Sunshine <-> driver au boot (bug #4065) qui peut
  # déclencher un TDR sur RX 9070 / Win11 24H2 (à croiser avec le crash FHC02).
  ansible.windows.win_service:
    name: SunshineService
    start_mode: delayed
    state: "{{ 'restarted' if (sunshine_conf.changed or sunshine_apps_file.changed) else 'started' }}"

- name: Sunshine — firewall TCP ports (Web UI + pairing + control), LAN only
  community.windows.win_firewall_rule:
    name: Sunshine TCP (LAN)
    localport: 47984,47989,47990,48010
    protocol: tcp
    direction: in
    action: allow
    enabled: true
    profiles: private
    state: present

- name: Sunshine — firewall UDP ports (video/audio/control RTP), LAN only
  community.windows.win_firewall_rule:
    name: Sunshine UDP (LAN)
    localport: 47998-48002
    protocol: udp
    direction: in
    action: allow
    enabled: true
    profiles: private
    state: present
