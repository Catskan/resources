---
# GPU + chipset drivers — Phase 3 refactor.
# AMD chipset and AMD GPU driver are NOT in the winget catalog, so
# drivers stay in their own file with direct_url + silent install:
#
#   AMD chipset → direct_url (from amd_chipset_url in host_vars), silent
#                 .exe install. Critical on 9800X3D for the v-cache aware
#                 scheduler.
#
#   AMD GPU (Adrenalin) → direct_url from amd_gpu_driver_url, silent
#                          .exe install. Set amd_gpu_install: false on
#                          hosts without a discrete AMD GPU (e.g. VM).

# ======================== §4.4.1 AMD chipset ========================

- name: AMD chipset — check if already installed
  ansible.windows.win_powershell:
    script: |
      # Check if AMD chipset software is installed via registry or installed programs
      $present = $false
      # Method 1: CIM registry key (older versions)
      $key = 'HKLM:\SOFTWARE\AMD\CIM'
      if (Test-Path $key) {
        $present = $null -ne (Get-ItemProperty -Path $key -ErrorAction SilentlyContinue).amd_chipset_software_version
      }
      # Method 2: Uninstall registry (newer versions)
      if (-not $present) {
        $paths = @(
          'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
          'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
        )
        $present = ($paths | ForEach-Object { Get-ItemProperty $_ -ErrorAction SilentlyContinue } |
          Where-Object { $_.DisplayName -like '*AMD Chipset*' } |
          Measure-Object).Count -gt 0
      }
      $Ansible.Result = @{ present = $present }
      $Ansible.Changed = $false
  register: amd_chipset_check
  changed_when: false
  when: amd_chipset_install | bool

- name: AMD chipset — download installer
  ansible.windows.win_get_url:
    url: "{{ amd_chipset_url }}"
    dest: 'C:\Windows\Temp\amd_chipset_software.exe'
    force: false
  when:
    - amd_chipset_install | bool
    - not (amd_chipset_check.result.present | default(false))
    - amd_chipset_url | length > 0

- name: AMD chipset — silent install
  ansible.windows.win_command:
    cmd: 'C:\Windows\Temp\amd_chipset_software.exe /S'
  register: amd_install_result
  when:
    - amd_chipset_install | bool
    - not (amd_chipset_check.result.present | default(false))
    - amd_chipset_url | length > 0

- name: Flag reboot after AMD chipset install
  ansible.builtin.set_fact:
    reboot_required: true
  when: amd_install_result.changed | default(false)

# ======================== §4.4.2 NVIDIA cleanup (migration to AMD) ========================
# One-shot cleanup for the RTX 3080 → RX 9070 XT migration.
# Safe to leave in place — every task is idempotent and no-ops once
# NVIDIA is gone.

- name: NVIDIA cleanup — uninstall driver via setup API
  ansible.windows.win_powershell:
    script: |
      # Find NVIDIA display driver uninstall string in registry
      $paths = @(
        'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
        'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
      )
      $nv = $paths | ForEach-Object { Get-ItemProperty $_ -ErrorAction SilentlyContinue } |
        Where-Object { $_.DisplayName -like '*NVIDIA Graphics Driver*' -or $_.DisplayName -like '*NVIDIA Display Driver*' } |
        Select-Object -First 1
      if (-not $nv) {
        $Ansible.Changed = $false
        $Ansible.Result = "No NVIDIA driver found — already clean"
        return
      }
      $uninstall = $nv.UninstallString
      if (-not $uninstall) {
        $Ansible.Changed = $false
        $Ansible.Result = "NVIDIA entry found but no UninstallString"
        return
      }
      # Run the uninstaller silently
      $job = Start-Job -ScriptBlock {
        param($cmd)
        & cmd /c "$cmd -s -clean" *>$null
        $LASTEXITCODE
      } -ArgumentList $uninstall
      if (-not (Wait-Job $job -Timeout 600)) {
        Stop-Job $job; Remove-Job $job -Force
        throw "NVIDIA uninstall timed out after 10 minutes"
      }
      $exitCode = Receive-Job $job
      Remove-Job $job
      $Ansible.Changed = $true
      $Ansible.Result = "NVIDIA driver uninstalled (exit $exitCode)"
  register: nvidia_uninstall_result
  when: inventory_hostname == "aurelien-gaming"

- name: NVIDIA cleanup — stop and disable telemetry services
  ansible.windows.win_service:
    name: "{{ item }}"
    start_mode: disabled
    state: stopped
  loop:
    - NvTelemetryContainer
    - NvContainerLocalSystem
    - NvContainerNetworkService
    - NVDisplay.ContainerLocalSystem
  failed_when: false
  when: inventory_hostname == "aurelien-gaming"

- name: NVIDIA cleanup — remove telemetry scheduled task
  community.windows.win_scheduled_task:
    name: NvTmRep_CrashReport
    state: absent
  failed_when: false
  when: inventory_hostname == "aurelien-gaming"

- name: NVIDIA cleanup — remove leftover files
  ansible.windows.win_file:
    path: "{{ item }}"
    state: absent
  loop:
    - 'C:\Program Files\NVIDIA Corporation'
    - 'C:\Program Files (x86)\NVIDIA Corporation'
    - 'C:\ProgramData\NVIDIA Corporation'
    - 'C:\Windows\Temp\nvidia-driver.exe'
  failed_when: false
  when: inventory_hostname == "aurelien-gaming"

- name: NVIDIA cleanup — uninstall NVCleanstall (no longer needed)
  ansible.windows.win_powershell:
    script: |
      $result = & winget uninstall --id TechPowerUp.NVCleanstall --silent --accept-source-agreements 2>&1
      if ($LASTEXITCODE -eq 0) {
        $Ansible.Changed = $true
      } else {
        # Package not found = already gone
        $Ansible.Changed = $false
      }
  failed_when: false
  when: inventory_hostname == "aurelien-gaming"

- name: Flag reboot after NVIDIA cleanup
  ansible.builtin.set_fact:
    reboot_required: true
  when: nvidia_uninstall_result.changed | default(false)

# ======================== §4.4.3 AMD GPU driver (Adrenalin) ========================

- name: AMD GPU — check if Adrenalin is already installed
  ansible.windows.win_powershell:
    script: |
      $present = $false
      # Method 1: AMD registry key (Adrenalin sets this on install)
      $key = 'HKLM:\SOFTWARE\AMD\CN'
      if (Test-Path $key) {
        $present = $null -ne (Get-ItemProperty -Path $key -ErrorAction SilentlyContinue).DriverVersion
      }
      # Method 2: Uninstall registry
      if (-not $present) {
        $paths = @(
          'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
          'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
        )
        $present = ($paths | ForEach-Object { Get-ItemProperty $_ -ErrorAction SilentlyContinue } |
          Where-Object { $_.DisplayName -like '*AMD Software: Adrenalin*' -or $_.DisplayName -like '*AMD Adrenalin*' } |
          Measure-Object).Count -gt 0
      }
      $Ansible.Result = @{ present = $present }
      $Ansible.Changed = $false
  register: amd_gpu_check
  changed_when: false
  when: amd_gpu_install | bool

- name: AMD GPU — download Adrenalin installer
  ansible.windows.win_get_url:
    url: "{{ amd_gpu_driver_url }}"
    dest: 'C:\Windows\Temp\amd_gpu_adrenalin.exe'
    force: false
  when:
    - amd_gpu_install | bool
    - not (amd_gpu_check.result.present | default(false))
    - amd_gpu_driver_url | length > 0

- name: AMD GPU — silent install
  ansible.windows.win_command:
    cmd: 'C:\Windows\Temp\amd_gpu_adrenalin.exe /S'
  register: amd_gpu_install_result
  when:
    - amd_gpu_install | bool
    - not (amd_gpu_check.result.present | default(false))
    - amd_gpu_driver_url | length > 0

- name: Flag reboot after AMD GPU install
  ansible.builtin.set_fact:
    reboot_required: true
  when: amd_gpu_install_result.changed | default(false)

# ======================== §4.4.5 Power plan ========================
# Set AFTER the AMD chipset install, because the chipset package is what
# ships the `AMD Ryzen Balanced` plan — running this earlier would force
# a 2-run convergence on fresh provisions.
# AMD Ryzen Balanced is recommended over High Performance for 9800X3D
# (Tom's Hardware + AMD guidance 2026) — High Performance breaks the
# X3D cache-aware boost behavior.

# ======================== MSI Afterburner — NVIDIA only ========================
# Redundant with Adrenalin on AMD GPUs. Only install + configure on NVIDIA.

- name: Afterburner — install via winget (NVIDIA only)
  ansible.windows.win_powershell:
    script: |
      $result = & winget install --id Guru3D.Afterburner --silent --accept-source-agreements --accept-package-agreements 2>&1
      if ($LASTEXITCODE -eq 0) {
        $Ansible.Changed = $true
      } else {
        # Already installed or no update
        $Ansible.Changed = $false
      }
  when:
    - inventory_hostname == "aurelien-gaming"
    - not (amd_gpu_install | bool)

- name: Afterburner — ensure config has start with Windows + minimized
  ansible.windows.win_powershell:
    script: |
      $cfgPath = "${env:ProgramFiles(x86)}\MSI Afterburner\Profiles\MSIAfterburner.cfg"
      if (-not (Test-Path $cfgPath)) {
        $Ansible.Changed = $false
        $Ansible.Result = "MSI Afterburner not installed — skipping"
        return
      }
      $content = Get-Content $cfgPath -Raw
      $changed = $false
      @{
        'StartWithWindows' = '1'
        'StartMinimized'   = '1'
      }.GetEnumerator() | ForEach-Object {
        $key = $_.Key; $val = $_.Value
        if ($content -match "(?m)^$key=(.+)$") {
          if ($Matches[1].Trim() -ne $val) {
            $content = $content -replace "(?m)^$key=.+$", "$key=$val"
            $changed = $true
          }
        }
      }
      if ($changed) {
        Set-Content $cfgPath -Value $content -NoNewline
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  when:
    - inventory_hostname == "aurelien-gaming"
    - not (amd_gpu_install | bool)

- name: Afterburner — remove duplicate Run registry key (app manages its own startup)
  ansible.windows.win_regedit:
    path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run'
    name: MSI Afterburner
    state: absent
  when:
    - inventory_hostname == "aurelien-gaming"
    - not (amd_gpu_install | bool)

- name: Afterburner — uninstall (not needed on AMD GPU)
  ansible.windows.win_powershell:
    script: |
      $result = & winget uninstall --id Guru3D.Afterburner --silent --accept-source-agreements 2>&1
      if ($LASTEXITCODE -eq 0) {
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  failed_when: false
  when:
    - inventory_hostname == "aurelien-gaming"
    - amd_gpu_install | bool

- name: Power plan — set Balanced
  community.windows.win_power_plan:
    name: Balanced
  when: inventory_hostname == "aurelien-gaming"
