---
# Orchestrateur du rôle windows_gaming.
# Chaque bloc est taggé pour permettre l'exécution sélective. Les
# include_tasks utilisent `apply:` pour propager le tag aux sous-tasks
# (sans ça, --tags <X> ne ferait que firer l'include sans exécuter son
# contenu).
#
#   --tags bootstrap         : préparation système (WinRM, UAC, AutoLogon)
#   --tags system            : power plan, hostname, services, MS account
#   --tags rdp               : configuration RDP
#   --tags wol               : Wake-on-LAN
#   --tags user_folders      : redirection User Shell Folders (M:\Aurel)
#   --tags defender          : Defender exclusions + Tamper guard
#   --tags gaming_optim      : VBS off, kernel, Game DVR/Mode, hibernate
#   --tags console_ux        : AppX bloatware + Cortana/Bing/Widgets/Edge
#                              policies + Firefox-as-default + telemetry
#   --tags softwares_winget  : install des apps user + tooling via winget
#                              (Phase 3 — remplace l'ancien chain
#                              softwares_check/download/install)
#   --tags firefox           : Firefox policies (cross-platform)
#   --tags launcher_paths    : game launcher install paths (Steam, Epic,
#                              GOG, EA, Rockstar, Ubisoft)
#   --tags drivers           : AMD chipset (direct_url) + AMD GPU
#                              Adrenalin (direct_url)
#   --tags keepassxc         : KeePassXC pointed at the NAS vault UNC +
#                              tray autostart + Defender exclusion
#                              (bare-metal only)
#   --tags xbox_mode         : Win11 Xbox Full-Screen Experience —
#                              controller-first console-like shell,
#                              boot direct into Xbox app (bare-metal only)
#   --tags sunshine          : Sunshine game streaming server + Moonlight
#                              pairing, LAN firewall (bare-metal only)
#   --tags rustdesk          : RustDesk desktop remoting + permanent
#                              password + LAN firewall (bare-metal only)

- name: System settings (power plan, RDP, AutoLogon, MS account, WoL, UAC)
  ansible.builtin.include_tasks:
    file: system_settings.yml
    # `system` est le tag de base appliqué à TOUTES les sous-tâches ; les
    # sous-ensembles rdp/wol/bootstrap sont tagués individuellement dans le
    # fichier, si bien que `--tags rdp` (ou wol/bootstrap) ne joue que le
    # sous-ensemble concerné, tandis que `--tags system` reste le catch-all.
    apply:
      tags: [system]
  tags: [bootstrap, system, rdp, wol]

- name: Relocate User Shell Folders to {{ root_user_directory | default('M:\\Aurel') }}
  ansible.builtin.include_tasks:
    file: user_folders.yml
    apply:
      tags: [user_folders]
  tags: [user_folders]
  when: inventory_hostname == "aurelien-gaming"

- name: Apply Windows Defender exclusions and tuning
  ansible.builtin.include_tasks:
    file: defender.yml
    apply:
      tags: [system, defender]
  tags: [system, defender]

- name: Apply gaming optimizations (VBS off, kernel, network, Game DVR)
  ansible.builtin.include_tasks:
    file: gaming_optim.yml
    apply:
      tags: [system, gaming_optim]
  tags: [system, gaming_optim]

- name: Apply console-style UX hardening
  ansible.builtin.include_tasks:
    file: console_ux.yml
    apply:
      tags: [system, console_ux]
  tags: [system, console_ux]

- name: Apply power & console-appliance UX (sleep, lock screen, nags, taskbar)
  ansible.builtin.include_tasks:
    file: power_ux.yml
    apply:
      tags: [power_ux]
  tags: [power_ux]
  when: inventory_hostname == "aurelien-gaming"

- name: Control Windows Update (no surprise reboot, pin version, exclude drivers)
  ansible.builtin.include_tasks:
    file: windows_update.yml
    apply:
      tags: [wu_control]
  tags: [wu_control]
  when: inventory_hostname == "aurelien-gaming"

- name: Apply Firefox policies (cross-platform)
  ansible.builtin.include_role:
    name: common
    tasks_from: firefox_policies.yml
    apply:
      tags: [softwares_winget, firefox]
  tags: [softwares_winget, firefox]

- name: Install user apps + tooling via winget
  ansible.builtin.include_tasks:
    file: softwares_winget.yml
    apply:
      tags: [softwares_winget]
  tags: [softwares_winget]

- name: Configure game launcher install paths (Steam, Epic, GOG, EA, Rockstar, Ubisoft)
  ansible.builtin.include_tasks:
    file: launcher_paths.yml
    apply:
      tags: [launcher_paths]
  tags: [launcher_paths]
  when: inventory_hostname == "aurelien-gaming"

- name: Install and tune GPU/chipset drivers
  ansible.builtin.include_tasks:
    file: drivers.yml
    apply:
      tags: [drivers]
  tags: [drivers]

- name: Configure KeePassXC (NAS vault auto-open + tray + autostart)
  ansible.builtin.include_tasks:
    file: keepassxc_setup.yml
    apply:
      tags: [keepassxc]
  tags: [keepassxc]
  when: inventory_hostname == "aurelien-gaming"

- name: Configure OpenRGB (startup minimized for RGB control)
  ansible.builtin.include_tasks:
    file: openrgb_setup.yml
    apply:
      tags: [openrgb]
  tags: [openrgb]
  when:
    - inventory_hostname == "aurelien-gaming"
    - openrgb_enabled | bool

- name: Enable Xbox Full-Screen Experience (console-like shell)
  ansible.builtin.include_tasks:
    file: xbox_mode.yml
    apply:
      tags: [xbox_mode]
  tags: [xbox_mode]
  when: inventory_hostname == "aurelien-gaming"

- name: Configure Vibeshine game streaming (fork Sunshine — Moonlight clients via LAN)
  ansible.builtin.include_tasks:
    file: vibeshine_setup.yml
    apply:
      tags: [sunshine, vibeshine]
  tags: [sunshine, vibeshine]
  when:
    - inventory_hostname == "aurelien-gaming"
    - sunshine_enabled | bool

- name: Configure RustDesk desktop remoting (LAN direct IP)
  ansible.builtin.include_tasks:
    file: rustdesk_setup.yml
    apply:
      tags: [rustdesk]
  tags: [rustdesk]
  when:
    - inventory_hostname == "aurelien-gaming"
    - rustdesk_enabled | bool

- name: Provision LLM inference node for vinted-bot (LM Studio + OpenSSH, models on D:)
  ansible.builtin.include_tasks:
    file: ai_llm_host.yml
    apply:
      tags: [ai]
  tags: [ai]
  when:
    - inventory_hostname == "aurelien-gaming"
    - ai_llm_host_enabled | bool

- name: Reboot if any task flagged it
  ansible.windows.win_reboot:
    reboot_timeout: 600
    test_command: 'exit (Get-Service -Name WinRM).Status -ne "Running"'
  when: reboot_required | default(false)
  tags: [always]
