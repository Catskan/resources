- name: Disable Nahimic Service (no-op if Asus audio driver not installed)
  ansible.windows.win_service:
    name: NahimicService
    start_mode: disabled
    state: stopped
  failed_when: false

# VSS access control — grant snapshot/backup rights to SYSTEM and the
# interactive user so Restore Point / wbAdmin / 3rd-party snapshot tools
# can capture volumes that hold redirected user folders on M:\.
- name: Grant VSS access to NT Authority\System
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\VSS\VssAccessControl
    name: 'NT Authority\System'
    data: 1
    type: dword

- name: Grant VSS access to interactive user
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\VSS\VssAccessControl
    name: '.\{{ ansible_user }}'
    data: 1
    type: dword

##########################################Install all Windows Updates##########################################
# - name: Unregister Scheduled job if one exists
#   win_shell: 'Start-Process powershell.exe -ArgumentList "-Command  `"&{`Unregister-ScheduledJob  -name ansible-win-updates;}`"" -Wait -verb RunAs'
- name: Turn off UAC
  tags: [bootstrap]
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\policies\system
    name: EnableLUA
    data: 0
    type: dword
    state: present
  register: output_uac

- name: Reboot to apply UAC Turned off
  tags: [bootstrap]
  ansible.windows.win_reboot:
  when: output_uac is changed

# Windows Update Active Hours — no reboot/install pop-up during your typical
# gaming window. The reg keys live under WindowsUpdate\UX\Settings. Values
# are 24h-clock integers (hour-only, not minutes). ActiveHoursMaxRange=18
# allows the manual range to span 18h (Win11 default is 18).
- name: Windows Update Active Hours — start
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings
    name: ActiveHoursStart
    data: "{{ windows_update_active_hours.start }}"
    type: dword

- name: Windows Update Active Hours — end
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings
    name: ActiveHoursEnd
    data: "{{ windows_update_active_hours.end }}"
    type: dword

- name: Windows Update Active Hours — disable auto-detection (use manual range)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings
    name: SmartActiveHoursState
    data: 0
    type: dword
