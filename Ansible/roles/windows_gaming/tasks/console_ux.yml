---
# Console-style UX hardening — debloat, debrand, deinterrupt.
# See spec §4.3.
#
# Conceptual split:
#   §4.3.1 AppX bloatware extended    ← below
#   §4.3.2 Cortana / Bing / Widgets    ← Task 9
#   §4.3.3 OneDrive uninstall          ← Task 10
#   §4.3.4 Edge neutralization         ← Task 11
#   §4.3.5 Firefox default             ← Task 12
#   §4.3.6 Telemetry minimum           ← Task 13
#   §4.3.7 Notifications/bg/startup    ← Task 13

# ======================== §4.3.1 AppX bloatware extended ========================

- name: Uninstall AppX bloatware
  ansible.builtin.include_tasks: appx_bloatware.yml

# ======================== §4.3.2 Cortana / Bing / Widgets / Start menu ========================

- name: Cortana — disable via Windows Search policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
    name: AllowCortana
    data: "{{ 0 if cortana_disabled else 1 }}"
    type: dword

- name: Widgets — disable News and Interests
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Dsh
    name: AllowNewsAndInterests
    data: "{{ 0 if widgets_disabled else 1 }}"
    type: dword

- name: Start menu — hide Recommended section
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: HideRecommendedSection
    data: "{{ 1 if recommended_files_off else 0 }}"
    type: dword

- name: Bing search / Cortana / recommendations (HKCU per-user)
  ansible.windows.win_powershell:
    script: |
      $changed = $false
      $entries = @(
        @{Path='HKCU:\Software\Microsoft\Windows\CurrentVersion\Search';                Name='BingSearchEnabled';         Value={{ 0 if bing_search_disabled else 1 }}},
        @{Path='HKCU:\Software\Microsoft\Windows\CurrentVersion\Search';                Name='CortanaConsent';             Value={{ 0 if cortana_disabled else 1 }}},
        @{Path='HKCU:\SOFTWARE\Policies\Microsoft\Windows\Explorer';                    Name='DisableSearchBoxSuggestions'; Value={{ 1 if bing_search_disabled else 0 }}},
        @{Path='HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced';     Name='Start_TrackDocs';             Value={{ 0 if recommended_files_off else 1 }}},
        @{Path='HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced';     Name='Start_TrackProgs';            Value={{ 0 if recommended_files_off else 1 }}}
      )
      foreach ($e in $entries) {
        if (-not (Test-Path $e.Path)) { New-Item -Path $e.Path -Force | Out-Null }
        $cur = (Get-ItemProperty -Path $e.Path -Name $e.Name -ErrorAction SilentlyContinue).($e.Name)
        if ($cur -ne $e.Value) {
          Set-ItemProperty -Path $e.Path -Name $e.Name -Value $e.Value -Type DWord
          $changed = $true
        }
      }
      $Ansible.Changed = $changed
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ user_name }}"
    ansible_become_pass: "{{ ansible_password }}"

# ======================== §4.3.3 OneDrive uninstall ========================

- name: OneDrive — uninstall completely
  ansible.windows.win_powershell:
    script: |
      $changed = $false
      # OneDriveSetup.exe exists in C:\Windows\System32\ even after uninstall
      # (Microsoft ships it with Windows). Only call /uninstall if OneDrive is
      # actually installed for the current user (presence of the per-user
      # OneDrive.exe binary, or the ProgramData install dir).
      $installed = (Test-Path "$env:LocalAppData\Microsoft\OneDrive\OneDrive.exe") -or
                   (Test-Path "$env:ProgramData\Microsoft OneDrive\OneDrive.exe")
      if ($installed) {
        Get-Process -Name OneDrive -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
        $candidates = @(
          "$env:SystemRoot\System32\OneDriveSetup.exe",
          "$env:SystemRoot\SysWOW64\OneDriveSetup.exe"
        )
        foreach ($exe in $candidates) {
          if (Test-Path $exe) {
            & $exe /uninstall | Out-Null
            $changed = $true
          }
        }
      }
      $paths = @(
        "$env:LocalAppData\Microsoft\OneDrive",
        "$env:ProgramData\Microsoft OneDrive",
        "$env:SystemDrive\OneDriveTemp",
        "$env:UserProfile\OneDrive"
      )
      foreach ($p in $paths) {
        if (Test-Path $p) {
          Remove-Item -Path $p -Recurse -Force -ErrorAction SilentlyContinue
          $changed = $true
        }
      }
      # Remove Explorer namespace entries (both 64-bit and 32-bit views)
      $ns = @(
        'HKCU:\SOFTWARE\Classes\CLSID\{018D5C66-4533-4307-9B53-224DE2ED1FE6}',
        'HKCU:\SOFTWARE\Classes\WOW6432Node\CLSID\{018D5C66-4533-4307-9B53-224DE2ED1FE6}'
      )
      foreach ($k in $ns) {
        if (Test-Path $k) {
          New-ItemProperty -Path $k -Name 'System.IsPinnedToNameSpaceTree' -Value 0 -PropertyType DWord -Force | Out-Null
          $changed = $true
        }
      }
      # Run entry
      $runPath = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run'
      if (Get-ItemProperty -Path $runPath -Name 'OneDrive' -ErrorAction SilentlyContinue) {
        Remove-ItemProperty -Path $runPath -Name 'OneDrive' -ErrorAction SilentlyContinue
        $changed = $true
      }
      $Ansible.Changed = $changed
  when: onedrive_uninstall
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ user_name }}"
    ansible_become_pass: "{{ ansible_password }}"

- name: OneDrive — block reinstall via group policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\OneDrive
    name: DisableFileSyncNGSC
    data: 1
    type: dword
  when: onedrive_uninstall

# ======================== §4.3.4 Edge neutralization ========================

- name: Edge — disable update services
  ansible.windows.win_service:
    name: "{{ item }}"
    start_mode: disabled
    state: stopped
  loop:
    - edgeupdate
    - edgeupdatem
    - MicrosoftEdgeElevationService
  failed_when: false
  when: edge_neutralize

- name: Edge — apply restrictive policies
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: "{{ item.name }}"
    data: "{{ item.value }}"
    type: dword
  loop:
    - { name: StartupBoostEnabled, value: 0 }
    - { name: BackgroundModeEnabled, value: 0 }
    - { name: HideFirstRunExperience, value: 1 }
    - { name: PersonalizationReportingEnabled, value: 0 }
    - { name: EdgeShoppingAssistantEnabled, value: 0 }
    - { name: ConfigureDoNotTrack, value: 1 }
  when: edge_neutralize

- name: Edge — remove desktop shortcuts
  ansible.windows.win_powershell:
    script: |
      $changed = $false
      $dirs = @("$env:Public\Desktop", "$env:UserProfile\Desktop")
      foreach ($d in $dirs) {
        Get-ChildItem -Path $d -Filter '*Edge*.lnk' -ErrorAction SilentlyContinue | ForEach-Object {
          Remove-Item -Path $_.FullName -Force -ErrorAction SilentlyContinue
          $changed = $true
        }
      }
      $Ansible.Changed = $changed
  when: edge_neutralize
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ user_name }}"
    ansible_become_pass: "{{ ansible_password }}"

# ======================== §4.3.5 Firefox default browser ========================

- name: Firefox — detect installed ProgIds (hash varies per install)
  ansible.windows.win_powershell:
    script: |
      $htmlId = (Get-ChildItem 'HKLM:\SOFTWARE\Classes' -Name | Where-Object { $_ -match '^FirefoxHTML-' }) | Select-Object -First 1
      $urlId  = (Get-ChildItem 'HKLM:\SOFTWARE\Classes' -Name | Where-Object { $_ -match '^FirefoxURL-' })  | Select-Object -First 1
      if (-not $htmlId -or -not $urlId) {
        throw "Firefox ProgIds not found — is Firefox installed?"
      }
      $Ansible.Result = @{ html = $htmlId; url = $urlId }
      $Ansible.Changed = $false
  register: firefox_progids
  changed_when: false
  # Read-only probe — must run in --check too, otherwise the tasks below
  # reference firefox_progids.result on a skipped register.
  check_mode: false
  when: firefox_set_default

- name: Firefox — deploy DefaultAssociations.xml (dynamic ProgIds)
  ansible.windows.win_copy:
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <DefaultAssociations>
        <Association Identifier=".html"  ProgId="{{ firefox_progids.result.html }}" ApplicationName="Firefox" />
        <Association Identifier=".htm"   ProgId="{{ firefox_progids.result.html }}" ApplicationName="Firefox" />
        <Association Identifier=".shtml" ProgId="{{ firefox_progids.result.html }}" ApplicationName="Firefox" />
        <Association Identifier=".xht"   ProgId="{{ firefox_progids.result.html }}" ApplicationName="Firefox" />
        <Association Identifier=".xhtml" ProgId="{{ firefox_progids.result.html }}" ApplicationName="Firefox" />
        <Association Identifier="http"   ProgId="{{ firefox_progids.result.url }}"  ApplicationName="Firefox" />
        <Association Identifier="https"  ProgId="{{ firefox_progids.result.url }}"  ApplicationName="Firefox" />
        <Association Identifier="ftp"    ProgId="{{ firefox_progids.result.url }}"  ApplicationName="Firefox" />
        <Association Identifier=".pdf"   ProgId="{{ firefox_progids.result.html }}" ApplicationName="Firefox" />
      </DefaultAssociations>
    dest: 'C:\ProgramData\Microsoft\Windows\DefaultAssociations.xml'
  when: firefox_set_default

- name: Firefox — configure GPO to read DefaultAssociations.xml
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    name: DefaultAssociationsConfiguration
    data: 'C:\ProgramData\Microsoft\Windows\DefaultAssociations.xml'
    type: string
  when: firefox_set_default

- name: Firefox — register as a capable default browser
  ansible.windows.win_powershell:
    script: |
      # UserChoice for http/https is hash-protected by Windows and cannot be
      # written directly, so we only (idempotently) register Firefox's
      # capabilities. Actual default selection is confirmed once by the user
      # in Settings, or via the DefaultAssociations.xml GPO deployed above.
      $urlId = '{{ firefox_progids.result.url }}'
      $changed = $false
      $ffKey = 'HKLM:\SOFTWARE\Clients\StartMenuInternet\FIREFOX.EXE'
      if (Test-Path $ffKey) {
        # RegisteredApplications key name is 'Firefox-<hash>' where <hash> is
        # the same suffix as the FirefoxURL-<hash> ProgId — never hardcode it.
        $regName = 'Firefox-' + $urlId.Split('-')[-1]
        $regApps = 'HKLM:\SOFTWARE\RegisteredApplications'
        $desired = 'SOFTWARE\Clients\StartMenuInternet\FIREFOX.EXE\Capabilities'
        $current = (Get-ItemProperty $regApps -Name $regName -ErrorAction SilentlyContinue).$regName
        if ($current -ne $desired) {
          Set-ItemProperty $regApps -Name $regName -Value $desired
          $changed = $true
        }
      }
      $Ansible.Changed = $changed
  when: firefox_set_default

# ── Taskbar pinning : NON automatisé (limitation Windows 11) ──────────────
# Les verbes shell « Pin to taskbar / Unpin from taskbar » (Shell.Application
# COM) ont été retirés par Microsoft depuis Win10 1809 : sur Win11 ils
# n'apparaissent plus dans .Verbs(), donc les anciennes tâches étaient des
# no-op silencieux (vérifié sur aurelien-gaming : toujours "ok", jamais d'effet)
# — et le matching était en plus dépendant de la locale (3 langues seulement).
# Il n'existe aucune API supportée pour épingler la barre des tâches d'un profil
# EXISTANT (le blob binaire HKCU\...\Taskband\Favorites est protégé et change
# de format entre builds ; un LayoutModification.xml ne s'applique qu'aux
# nouveaux profils). Épinglage Firefox/KeePassXC à faire manuellement une fois,
# ou via une image de déploiement pour un profil neuf. Tâches supprimées pour
# ne pas afficher un faux "ok".

# ======================== §4.3.6 Telemetry minimum ========================

- name: Telemetry — apply DataCollection policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
    name: "{{ item.name }}"
    data: "{{ item.value }}"
    type: dword
  loop:
    - { name: AllowTelemetry, value: 1 }
    - { name: DoNotShowFeedbackNotifications, value: 1 }
  when: telemetry_minimum

- name: Telemetry — apply AdvertisingInfo policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\AdvertisingInfo
    name: DisabledByGroupPolicy
    data: 1
    type: dword
  when: telemetry_minimum

- name: Telemetry — apply CloudContent policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CloudContent
    name: "{{ item.name }}"
    data: "{{ item.value }}"
    type: dword
  loop:
    - { name: DisableConsumerFeatures, value: 1 }
    - { name: DisableWindowsConsumerFeatures, value: 1 }
    - { name: DisableTailoredExperiencesWithDiagnosticData, value: 1 }
  when: telemetry_minimum

- name: Telemetry — disable DiagTrack service if present
  ansible.windows.win_service:
    name: "{{ item }}"
    start_mode: disabled
    state: stopped
  loop:
    - DiagTrack
    - dmwappushservice
  failed_when: false
  when: telemetry_minimum

# ======================== §4.3.7 Notifications + Background apps + Startup ========================

- name: Notifications — global toggle (HKCU)
  ansible.windows.win_powershell:
    script: |
      $changed = $false
      $entries = @(
        @{Path='HKCU:\Software\Microsoft\Windows\CurrentVersion\PushNotifications';                       Name='ToastEnabled';                       Value={{ 0 if notifications_globally_off else 1 }}},
        @{Path='HKCU:\Software\Microsoft\Windows\CurrentVersion\Notifications\Settings';                  Name='NOC_GLOBAL_SETTING_TOASTS_ENABLED';   Value={{ 0 if notifications_globally_off else 1 }}}
      )
      foreach ($e in $entries) {
        if (-not (Test-Path $e.Path)) { New-Item -Path $e.Path -Force | Out-Null }
        $cur = (Get-ItemProperty -Path $e.Path -Name $e.Name -ErrorAction SilentlyContinue).($e.Name)
        if ($cur -ne $e.Value) {
          Set-ItemProperty -Path $e.Path -Name $e.Name -Value $e.Value -Type DWord
          $changed = $true
        }
      }
      $Ansible.Changed = $changed
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ user_name }}"
    ansible_become_pass: "{{ ansible_password }}"

- name: Background apps — Force Deny global policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\AppPrivacy
    name: LetAppsRunInBackground
    data: "{{ 2 if background_apps_force_deny else 0 }}"
    type: dword

- name: Startup apps — disable explicit list
  ansible.windows.win_powershell:
    script: |
      $names = @({{ startup_apps_disable | map('to_json') | join(', ') }})
      $changed = $false
      $runKeys = @(
        'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run',
        'HKCU:\Software\Microsoft\Windows\CurrentVersion\RunOnce',
        'HKLM:\Software\Microsoft\Windows\CurrentVersion\Run',
        'HKLM:\Software\Microsoft\Windows\CurrentVersion\RunOnce'
      )
      foreach ($k in $runKeys) {
        if (-not (Test-Path $k)) { continue }
        $props = (Get-Item -Path $k).Property
        foreach ($p in $props) {
          foreach ($n in $names) {
            if ($p -like "*$n*") {
              Remove-ItemProperty -Path $k -Name $p -ErrorAction SilentlyContinue
              $changed = $true
            }
          }
        }
      }
      $Ansible.Changed = $changed
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ user_name }}"
    ansible_become_pass: "{{ ansible_password }}"
