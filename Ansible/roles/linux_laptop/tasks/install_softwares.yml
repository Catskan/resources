- name: Install Firefox & Thunderbird
  community.general.pacman:
    name:
      - firefox
      - thunderbird
    state: present
  vars:
    ansible_become: yes
    ansible_become_password: "{{ sudo_pwd }}"

- name: Install Remmina
  community.general.pacman:
    name: remmina
    state: present
  vars:
    ansible_become: yes
    ansible_become_pass: "{{ sudo_pwd }}"

- name: Download VideoDownloadHelper Companion
  ansible.builtin.get_url:
    url: https://github.com/mi-g/vdhcoapp/releases/download/v1.6.3/net.downloadhelper.coapp-1.6.3-1_amd64.tar.gz
    dest: /home/aurel/Downloads

- name: Untar VideoDownloadHelper Companion
  ansible.builtin.command: /bin/tar -xf /home/aurel/Downloads/net.downloadhelper.coapp-1.6.3-1_amd64.tar.gz -C /usr/local
  args:
    creates: /usr/local/net.downloadhelper.coapp-1.6.3
  vars:
    ansible_become: yes
    ansible_become_password: "{{ sudo_pwd }}"

- name: Install VideoDownloadHelper Companion
  ansible.builtin.command: /usr/local/net.downloadhelper.coapp-1.6.3/bin/net.downloadhelper.coapp-linux-64 install --system
  vars:
    ansible_become: yes
    ansible_become_password: "{{ sudo_pwd }}"

