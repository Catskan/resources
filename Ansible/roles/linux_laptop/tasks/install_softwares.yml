- name: Install Dev softwares
  community.general.pacman:
    name: git
    state: present
  vars:
    ansible_become: yes
    ansible_become_password: "{{ sudo_pwd }}"

- name: Install VsCodium
  community.general.pacman:
    name: vscodium-bin
    state: present
    executable: yay
  # vars:
  #   ansible_become: yes
  #   ansible_become_password: "{{ sudo_pwd }}"

- name: Install DevOPS tools
  community.general.pacman:
    name:
      - docker
      - docker-buildx
      - vagrant
    state: present
  vars:
    ansible_become: yes
    ansible_become_password: "{{ sudo_pwd }}"

- name: Install Vagrant Environment variables plugin
  # Sans become : les plugins Vagrant s'installent dans ~/.vagrant.d de
  # l'utilisateur, pas en root. Idempotent via la liste des plugins installés.
  ansible.builtin.command: vagrant plugin install vagrant-env
  register: vagrant_plugin
  changed_when: "'Installed the plugin' in vagrant_plugin.stdout"
  failed_when:
    - vagrant_plugin.rc != 0
    - "'already installed' not in vagrant_plugin.stdout"
