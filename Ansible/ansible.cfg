# Config Ansible du contrôleur MacBook. Volontairement minimale : seules les
# options réellement utilisées sont déclarées (l'ancien fichier était le
# scaffold complet de `ansible-config init --disabled`, 976 lignes commentées).

[defaults]
inventory            = ./inventory/hosts.yaml
roles_path           = ./roles
local_tmp            = ~/.ansible/tmp
deprecation_warnings = False
host_key_checking    = True
# Supprime le warning de découverte de l'interpréteur Python (arch laptop).
interpreter_python   = auto_silent
# 2 hôtes Windows traités en parallèle sans attente inutile.
forks                = 10

[ssh_connection]
# Concerne uniquement l'arch laptop (les hôtes Windows sont en WinRM) —
# gain réel de latence sur les runs SSH.
pipelining = True
