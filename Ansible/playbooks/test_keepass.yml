---
# Vérifie que chaque entrée KeePass attendue par les rôles est résolvable.
# Affiche la longueur du secret en clair (jamais la valeur elle-même).
#
# Lancement : make test-keepass
#
# Si un lookup échoue, ansible plante en indiquant le path concerné — corrige
# ton DB ou le path d'exemple dans ce fichier, puis relance.

- name: Test KeePass lookups
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # Liste synchronisée avec les lookups réels de l'inventaire :
    #   grep -rhoE "keepass',\s*'[^']*',\s*'[^']*'" inventory/ | sort -u
    keepass_entries:
      # --- Comptes locaux Windows (connection + AutoLogon) ---
      - label: "aurelien-gaming local_user username"
        path: "Local/Aurel-Gaming"
        field: "username"
      - label: "aurelien-gaming local_user password"
        path: "Local/Aurel-Gaming"
        field: "password"
      - label: "w11-vm-aurel local_user password"
        path: "Local/w11-vm-user"
        field: "password"

      # --- Remote access (bare-metal) ---
      - label: "Sunshine admin username"
        path: "Local/Sunshine"
        field: "username"
      - label: "Sunshine admin password"
        path: "Local/Sunshine"
        field: "password"
      - label: "RustDesk permanent password"
        path: "Local/RustDesk"
        field: "password"

      # --- Arch Linux laptop ---
      - label: "arch-linux-laptop sudo password"
        path: "ansible/arch-linux-laptop/sudo"
        field: "password"

      # --- Comptes applicatifs / services ---
      - label: "Microsoft account email"
        path: "Microsoft Account"
        field: "username"
      - label: "Microsoft account password"
        path: "Microsoft Account"
        field: "password"
      - label: "Ubisoft Connect username"
        path: "Uplay (Ubisoft)"
        field: "username"
      - label: "Ubisoft Connect password"
        path: "Uplay (Ubisoft)"
        field: "password"
      - label: "NAS Synology username"
        path: "Nas"
        field: "username"
      - label: "NAS Synology password"
        path: "Nas"
        field: "password"
      - label: "Docker Hub (catskan) password"
        path: "Dev/Docker Hub - catskan"
        field: "password"

  tasks:
    - name: Check KeePass entry
      ansible.builtin.debug:
        msg: >-
          OK — {{ item.path }} ({{ item.field }})
          : {{ lookup('viczem.keepass.keepass', item.path, item.field) | length }} chars
      loop: "{{ keepass_entries }}"
      loop_control:
        label: "{{ item.label }}"
