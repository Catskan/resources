---
# Phase 1 de la migration Wyse : création + démarrage du LXC claude-code.
# Le provisioning intérieur (Docker + déploiement compose) et la migration des
# données (rsync + checksums) sont des étapes SÉPARÉES (cf. MIGRATION-WYSE.md).
- name: Créer le LXC claude-code sur le Wyse (Proxmox)
  hosts: proxmox_hosts
  become: true
  gather_facts: true

  roles:
    - role: proxmox_claude_lxc
