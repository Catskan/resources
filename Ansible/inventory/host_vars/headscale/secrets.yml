---
# TLS du CT headscale : attachments de l'entrée KeePass "Certificate *.eonelia.fr"
# (groupe racine). viczem.keepass écrit chaque attachment dans un fichier temp
# (contrôleur) et retourne son CHEMIN → utilisé comme `src` de copy dans le rôle
# (préserve le binaire ; normalisation PEM/DER faite côté CT).
hs_kp_entry: "Certificate *.eonelia.fr"
hs_att_leaf: "{{ lookup('viczem.keepass.keepass', hs_kp_entry, 'attachments', 'eonelia.fr_ssl_certificate.cer') }}"
hs_att_int1: "{{ lookup('viczem.keepass.keepass', hs_kp_entry, 'attachments', 'intermediate1.cer') }}"
hs_att_int2: "{{ lookup('viczem.keepass.keepass', hs_kp_entry, 'attachments', 'intermediate2.cer') }}"
hs_att_key: "{{ lookup('viczem.keepass.keepass', hs_kp_entry, 'attachments', '*.eonelia.fr_private_key.key') }}"
