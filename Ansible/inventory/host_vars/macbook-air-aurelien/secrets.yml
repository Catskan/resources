# Secrets MacBook. L'ancien vault est sauvegardé dans `secrets.yml.vault.backup`
# — décrypte-le (`ansible-vault view`) pour vérifier qu'il ne contient pas
# d'autres vars que dockerHub_password avant de le supprimer.

# Docker Hub (catskan) — entrée existante dans KeePass
dockerHub_password: "{{ lookup('viczem.keepass.keepass', 'Dev/Docker Hub - catskan', 'password') }}"

# Mot de passe sudo du Air (contrôleur, compte aurel) — depuis KeePass.
# À CRÉER dans Aurel-vault.kdbx : entrée `ansible/macbook-air/sudo`
# (le champ password = le mot de passe sudo du Air).
ansible_become_password: "{{ lookup('viczem.keepass.keepass', 'ansible/macbook-air/sudo', 'password') }}"
