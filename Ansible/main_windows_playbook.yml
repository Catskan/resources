---
- name: Configure Windows hosts (Aurel-Gaming + W11-VM-Aurel)
  hosts: windows_hosts
  gather_facts: yes

  # Les vars sont chargées automatiquement depuis :
  #   inventory/group_vars/all/{main,secrets}.yml
  #   inventory/group_vars/windows_hosts/{connection,main}.yml
  #   inventory/host_vars/<host>/{connection,main,secrets}.yml

  roles:
    - role: windows_gaming
    # Durcissement SSH intégré, taggé `sshd` : inclus dans un run complet
    # (`make windows`) et ciblable seul via `make windows ARGS='--tags sshd'`
    # ou exclu via `--skip-tags sshd`.
    - role: win_sshd_hardening
      tags: [sshd]
