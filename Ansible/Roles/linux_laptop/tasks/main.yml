---
- ansible.builtin.include_tasks: settings_linux.yml
  tags: [system, settings]

- name: Download packages
  block:
    - ansible.builtin.include_tasks: downloads_packages.yml
  rescue:
    - ansible.builtin.debug:
        msg: "Téléchargement d'un package a échoué — voir les URLs versionnées."
  tags: [packages, packages_download]

- ansible.builtin.include_tasks: install_softwares.yml
  tags: [packages, packages_install]

- ansible.builtin.include_tasks: remove_softwares.yml
  tags: [packages, packages_remove, cleanup]
