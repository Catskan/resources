---
##########################################Aurel-Gaming##########################################

# ── Display language: English (US) with French keyboard ──────────────
- name: Install English (US) language pack
  ansible.windows.win_powershell:
    script: |
      $installed = Get-WindowsCapability -Online -Name 'Language.Basic~~~en-US~*' |
                   Where-Object State -eq 'Installed'
      if (-not $installed) {
        Install-Language en-US -CopyToSettings
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  register: lang_install

- name: Set display language to English (US) and keep FR keyboard
  ansible.windows.win_powershell:
    script: |
      $override = Get-WinUILanguageOverride
      $locale = Get-WinSystemLocale
      $list = Get-WinUserLanguageList
      $hasEnKeyboard = $list | Where-Object {
        $_.InputMethodTips -contains '0409:00000409'
      }

      $needsChange = (
        -not $override -or
        $override.Name -ne 'en-US' -or
        $locale.Name -ne 'en-US' -or
        $hasEnKeyboard
      )

      if ($needsChange) {
        Set-WinUILanguageOverride -Language en-US
        Set-WinSystemLocale -SystemLocale en-US
        Set-Culture -CultureInfo en-US

        $newList = New-WinUserLanguageList en-US
        $newList[0].InputMethodTips.Clear()
        $newList[0].InputMethodTips.Add('040c:0000040c')  # French AZERTY
        Set-WinUserLanguageList $newList -Force
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  register: lang_set

- name: Reboot to apply language change
  ansible.windows.win_reboot:
    reboot_timeout: 300
    test_command: 'exit (Get-Service -Name WinRM).Status -ne "Running"'
  when: lang_install.changed or lang_set.changed

- name: Ensure WinRM starts when the system has settled and is ready to work reliably
  ansible.windows.win_service:
    name: WinRM
    start_mode: delayed

# Power plan is set at the END of drivers.yml — after AMD Chipset install,
# which is what ships the `AMD Ryzen Balanced` plan. Running it here in
# system_settings.yml (early in the role) would race the chipset install
# on first provision and force a 2-run convergence.

#Set RDP
- name: Allow RDP TSConnection
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: 0
    type: dword
- name: Allow UserAuthentication
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: UserAuthentication
    data: 1
    type: dword
- name: Allow Client Drives
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: fAutoClientDrives
    data: 1
    type: dword
- name: Change RDP Port
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: PortNumber
    data: "{{ remote_desktop_port }}"
    type: dword
- name: Add user to Remote Desktop Group
  ansible.windows.win_group_membership:
    name: Remote Desktop Users
    members:
      - "{{ user_name }}"
    state: present
- name: Enable RDP inside the Firewall
  community.windows.win_firewall_rule:
    name: Remote Desktop
    localport: "{{ remote_desktop_port }}"
    action: allow
    direction: in
    protocol: tcp
    profiles: private
    state: present
    enabled: yes

- name: Enable AdminAutoLogOn
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: "AutoAdminLogon"
    data: 1
    type: dword

- name: Set Username
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: "DefaultUserName"
    data: "{{ user_name }}"
    type: expandstring

- name: Set Password
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: "DefaultPassword"
    data: "{{ remote_local_user_name_password }}"
    type: expandstring
  no_log: true

##########################################Change hostname##########################################
- name: Change W11 VM Aurel hostname
  ansible.windows.win_hostname:
    name: "{{ w11_vm_computer_hostname }}"
  register: old_hostname
  when: inventory_hostname == "w11-vm-aurel"

- name: Reboot W11-VM-Aurel
  ansible.windows.win_reboot:
    test_command: 'exit (Get-Service -Name WinRM).Status -ne "Running"'
  when: inventory_hostname == "w11-vm-aurel" and old_hostname.changed == true

- name: Share mapped drives between elevated and normal sessions
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    name: EnableLinkedConnections
    data: 1
    type: dword
  when: inventory_hostname == "aurelien-gaming"

- name: Save NAS credentials in Credential Manager
  community.windows.win_credential:
    name: "{{ nas_url }}"
    type: domain_password
    username: "{{ nas_username }}"
    secret: "{{ nas_password }}"
    state: present
    persistence: local
  vars:
    ansible_become: yes
    ansible_become_method: runas
    ansible_become_user: "{{ ansible_user }}"
    ansible_become_pass: "{{ ansible_password }}"
  no_log: true
  when: inventory_hostname == "aurelien-gaming"

- name: Map NAS drives (persistent — visible after logon)
  include_tasks: nas_drive_map.yml
  loop: "{{ nas_mapped_drives }}"
  loop_control:
    label: "{{ item.letter }}:"
  when: inventory_hostname == "aurelien-gaming"

- name: Save Microsoft Account Credentials to Credentials Store
  block:
    - name: Save the network credentials required for the mapped drive
      community.windows.win_credential:
        name: "MicrosoftAccount:user=a.busutil@icloud.com"
        type: generic_password
        username: "{{ microsoft_account_email }}"
        secret: "{{ microsoft_account_password }}"
        state: present
        persistence: local
  vars:
    ansible_become: yes
    ansible_become_method: runas
    ansible_become_user: "{{ ansible_user }}"
    ansible_become_pass: "{{ ansible_password }}"
  when: inventory_hostname == "aurelien-gaming"

- name: Enable Wake-on-LAN (Magic Packet) on all wired Ethernet adapters
  ansible.windows.win_powershell:
    # Idempotency: capture WakeOnMagicPacket state before and after the
    # Enable call, compare as strings (works whether the cmdlet returns
    # an enum object or an int). Only flag changed if the value moved.
    # Virtual NICs (UTM RTL8139, etc.) sometimes report success without
    # actual state change — this guard avoids spurious "changed" reports.
    script: |
      $changed = $false
      $adapters = Get-NetAdapter -Physical |
        Where-Object { $_.Status -eq 'Up' -and $_.MediaType -eq '802.3' }
      foreach ($a in $adapters) {
        try {
          $before = "$((Get-NetAdapterPowerManagement -Name $a.Name -ErrorAction SilentlyContinue).WakeOnMagicPacket)"
          Enable-NetAdapterPowerManagement -Name $a.Name -WakeOnMagicPacket -ErrorAction Stop
          $after  = "$((Get-NetAdapterPowerManagement -Name $a.Name -ErrorAction SilentlyContinue).WakeOnMagicPacket)"
          if ($before -ne $after) { $changed = $true }
        } catch {}
      }
      $Ansible.Changed = $changed
  vars:
    ansible_become: yes
    ansible_become_method: runas
    ansible_become_user: "{{ ansible_user }}"
    ansible_become_pass: "{{ ansible_password }}"
