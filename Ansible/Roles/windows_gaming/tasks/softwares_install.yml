- name: Install Firefox
  win_command: C:\Windows\System32\msiexec.exe /i C:\temp\Firefox.msi /qb /norestart
  when: Firefox_installed.exists == false

- name: Install Nvidia Drivers
  win_command: C:\temp\Nvidia-{{ nvidia_driver }}.exe /s /norestart
  register: nvidia_driver_install_result
  when: inventory_hostname == "aurelien-gaming" and Nvidia_installed.exists == false

