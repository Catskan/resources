---
# Redirect Windows User Shell Folders to M:\Aurel\... — keep the bulk user
# data off the Fanxiang NVMe (C:) and onto the SATA SSD (M:).
#
# Runs ONLY on aurelien-gaming (gated in main.yml).
#
# Effect applies at the next user login — Explorer re-reads
# HKCU:\...\Explorer\User Shell Folders on startup of explorer.exe
# (i.e., after sign-out/sign-in).
#
# 8 redirections active (audit Phase 2 spec §3.2.3):
#   Desktop, Documents, Downloads (GUID),
#   Music (My Music), Pictures (My Pictures), Videos (My Video),
#   Saved Games (GUID), Favorites
#
# Folders NOT redirected — kept on C:\ for app compatibility + NVMe speed:
#   AppData/Local/LocalLow/Cache, History, Cookies, Startup, Recent,
#   NetHood, PrintHood, SendTo, Templates, StartMenu. These are legacy
#   IE/Win9x or break apps that hardcode %USERPROFILE%\AppData\... when
#   moved.

- name: Ensure redirected user folder target directories exist on M:\
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ desktop_user_directory }}"
    - "{{ documents_user_directory }}"
    - "{{ downloads_user_directory }}"
    - "{{ myMusic_user_directory }}"
    - "{{ myPictures_user_directory }}"
    - "{{ myVideos_user_directory }}"
    - "{{ savedGames_user_directory }}"
    - "{{ favorites_user_directory }}"

- name: Redirect User Shell Folders (HKCU) to M:\
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders
    name: "{{ item.key }}"
    data: "{{ item.path }}"
    type: expandstring
  loop:
    - {
        key: "{{ desktop_user_directory_reg_key_name }}",
        path: "{{ desktop_user_directory }}",
      }
    - {
        key: "{{ documents_user_directory_reg_key_name }}",
        path: "{{ documents_user_directory }}",
      }
    - {
        key: "{{ downloads_user_directory_reg_key_name }}",
        path: "{{ downloads_user_directory }}",
      }
    - {
        key: "{{ myMusic_user_directory_reg_key_name }}",
        path: "{{ myMusic_user_directory }}",
      }
    - {
        key: "{{ myPictures_user_directory_reg_key_name }}",
        path: "{{ myPictures_user_directory }}",
      }
    - {
        key: "{{ myVideos_user_directory_reg_key_name }}",
        path: "{{ myVideos_user_directory }}",
      }
    - {
        key: "{{ savedGames_user_directory_reg_key_name }}",
        path: "{{ savedGames_user_directory }}",
      }
    - {
        key: "{{ favorites_user_directory_reg_key_name }}",
        path: "{{ favorites_user_directory }}",
      }
  loop_control:
    label: "{{ item.key }} → {{ item.path }}"
