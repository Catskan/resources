---
# Sunshine — self-hosted game streaming server (NVIDIA GameStream-compatible
# protocol, pairs with the Moonlight client family — Steam Deck, iPad,
# Apple TV, Android TV, Chromecast Google TV, browser, etc.). Installed
# by softwares_winget.yml (LizardByte.Sunshine); this task:
#
#   1) Locates sunshine.exe (winget drops it under Program Files\Sunshine)
#   2) Seeds the Web UI admin credentials via the CLI (`--creds`) — sourced
#      from KeePass (entry `ansible/aurelien-gaming/sunshine` with
#      username + password fields)
#   3) Installs the Windows service so Sunshine starts at boot (the
#      installer USUALLY does this, but we re-assert for idempotency)
#   4) Opens the standard Sunshine ports on the Windows firewall, profile
#      `private` only (LAN). NEVER add `public` here — Sunshine's RTSP
#      surface is not designed for raw internet exposure. WAN access
#      should go through Tailscale or similar VPN.
#
# After role run, the user finishes the setup interactively:
#   - Open https://localhost:47990 (or https://<aurel-gaming>:47990 from
#     another LAN device, self-signed cert warning is expected)
#   - Log in with the Sunshine admin creds from KeePass
#   - Pair each Moonlight client by entering the PIN that the client
#     displays into Sunshine's Web UI (one-time per client)
#
# Bare-metal only — gated in main.yml on inventory_hostname=aurelien-gaming
# AND on sunshine_enabled.

- name: Sunshine — locate installed binary
  ansible.windows.win_powershell:
    script: |
      $candidates = @(
        "$env:ProgramFiles\Sunshine\sunshine.exe",
        "${env:ProgramFiles(x86)}\Sunshine\sunshine.exe"
      )
      $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
      if (-not $exe) { throw "sunshine.exe not found — softwares_winget.yml didn't install LizardByte.Sunshine?" }
      $Ansible.Result = @{ path = $exe }
      $Ansible.Changed = $false
  register: sunshine_exe
  changed_when: false

- name: Sunshine — ensure ProgramData config directory exists
  ansible.windows.win_file:
    path: 'C:\ProgramData\Sunshine'
    state: directory

- name: Sunshine — deploy sunshine.conf (encoder + LAN restrictions + log level)
  ansible.windows.win_template:
    src: sunshine.conf.j2
    dest: 'C:\ProgramData\Sunshine\sunshine.conf'
  register: sunshine_conf

- name: Sunshine — deploy apps.json (Moonlight library: Desktop + Steam Big Picture + Xbox)
  ansible.windows.win_template:
    src: sunshine_apps.json.j2
    dest: 'C:\ProgramData\Sunshine\apps.json'
  register: sunshine_apps_file

- name: Sunshine — set Web UI admin credentials (from KeePass)
  ansible.windows.win_powershell:
    parameters:
      exe: "{{ sunshine_exe.result.path }}"
      adminUser: "{{ sunshine_admin_user }}"
      adminPw: "{{ sunshine_admin_password }}"
    script: |
      param([string]$exe, [string]$adminUser, [string]$adminPw)
      # --creds rewrites the credentials hash in sunshine.conf. Safe to
      # re-run with the same values — bcrypt produces a fresh hash each
      # time but the resulting "this user/pass authenticates" semantics
      # are identical, so we just mark unchanged.
      & $exe --creds $adminUser $adminPw 2>&1 | Out-Null
      $Ansible.Changed = $false
  no_log: true
  changed_when: false

- name: Sunshine — ensure Windows service is installed
  ansible.windows.win_powershell:
    parameters:
      exe: "{{ sunshine_exe.result.path }}"
    script: |
      param([string]$exe)
      $svc = Get-Service -Name 'SunshineService' -ErrorAction SilentlyContinue
      if (-not $svc) {
        # Fallback if the winget installer didn't register the service.
        # Sunshine ships a helper script in the install dir for this.
        $installScript = Join-Path (Split-Path $exe) 'Sunshine Service Install.bat'
        if (Test-Path $installScript) {
          & cmd.exe /c "`"$installScript`""
          $Ansible.Changed = $true
        } else {
          throw "Sunshine service not installed and 'Sunshine Service Install.bat' missing"
        }
      } else {
        $Ansible.Changed = $false
      }

- name: Sunshine — service auto-start (restart if config changed)
  ansible.windows.win_service:
    name: SunshineService
    start_mode: auto
    state: "{{ 'restarted' if (sunshine_conf.changed or sunshine_apps_file.changed) else 'started' }}"

- name: Sunshine — firewall TCP ports (Web UI + pairing + control), LAN only
  community.windows.win_firewall_rule:
    name: Sunshine TCP (LAN)
    localport: 47984,47989,47990,48010
    protocol: tcp
    direction: in
    action: allow
    enabled: true
    profiles: private
    state: present

- name: Sunshine — firewall UDP ports (video/audio/control RTP), LAN only
  community.windows.win_firewall_rule:
    name: Sunshine UDP (LAN)
    localport: 47998-48002
    protocol: udp
    direction: in
    action: allow
    enabled: true
    profiles: private
    state: present
