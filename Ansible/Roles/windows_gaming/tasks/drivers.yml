---
# GPU + chipset drivers — Phase 3 refactor.
# AMD chipset and NVIDIA driver are NOT in the winget catalog (verified
# 2026-05-15), so drivers stay in their own file with these strategies:
#
#   AMD chipset → direct_url (from amd_chipset_url in host_vars), silent
#                 .exe install. Critical on 9800X3D for the v-cache aware
#                 scheduler.
#
#   NVIDIA → choice of:
#     • nvcleanstall  (default): assumes TechPowerUp.NVCleanstall was
#                                installed in softwares_winget.yml. Runs
#                                its CLI: -clean -nogfe -notlm -nophysx →
#                                downloads + clean-installs latest driver
#                                without GeForce Experience or telemetry.
#     • direct_url    : download from nvidia_driver_url + silent install.
#     • skip          : no-op (used on the VM — no real GPU).
#
# Telemetry cleanup (services + scheduled task) runs unconditionally when
# nvidia_telemetry_cleanup is true.

# ======================== §4.4.1 AMD chipset ========================

- name: AMD chipset — check if already installed
  ansible.windows.win_powershell:
    script: |
      # Check if AMD chipset software is installed via registry or installed programs
      $present = $false
      # Method 1: CIM registry key (older versions)
      $key = 'HKLM:\SOFTWARE\AMD\CIM'
      if (Test-Path $key) {
        $present = $null -ne (Get-ItemProperty -Path $key -ErrorAction SilentlyContinue).amd_chipset_software_version
      }
      # Method 2: Uninstall registry (newer versions)
      if (-not $present) {
        $paths = @(
          'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
          'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
        )
        $present = ($paths | ForEach-Object { Get-ItemProperty $_ -ErrorAction SilentlyContinue } |
          Where-Object { $_.DisplayName -like '*AMD Chipset*' -or $_.DisplayName -like '*AMD Software*' } |
          Measure-Object).Count -gt 0
      }
      $Ansible.Result = @{ present = $present }
      $Ansible.Changed = $false
  register: amd_chipset_check
  changed_when: false
  when: amd_chipset_install | bool

- name: AMD chipset — download installer
  ansible.windows.win_get_url:
    url: "{{ amd_chipset_url }}"
    dest: 'C:\Windows\Temp\amd_chipset_software.exe'
    force: false
  when:
    - amd_chipset_install | bool
    - not (amd_chipset_check.result.present | default(false))
    - amd_chipset_url | length > 0

- name: AMD chipset — silent install
  ansible.windows.win_command:
    cmd: 'C:\Windows\Temp\amd_chipset_software.exe /S'
  register: amd_install_result
  when:
    - amd_chipset_install | bool
    - not (amd_chipset_check.result.present | default(false))
    - amd_chipset_url | length > 0

- name: Flag reboot after AMD chipset install
  ansible.builtin.set_fact:
    reboot_required: true
  when: amd_install_result.changed | default(false)

# ======================== §4.4.2 NVIDIA driver ========================

- name: NVIDIA — detect existing driver
  ansible.windows.win_powershell:
    script: |
      $nv = Get-PnpDevice -Class Display -ErrorAction SilentlyContinue |
            Where-Object FriendlyName -match 'NVIDIA'
      $Ansible.Result = @{ present = [bool]$nv }
      $Ansible.Changed = $false
  register: nvidia_check
  changed_when: false
  when: nvidia_driver_install_strategy != 'skip'

- name: NVIDIA — install driver via NVCleanstall (clean, no GFE / no telemetry)
  ansible.windows.win_powershell:
    script: |
      # NVCleanstall is installed by softwares_winget.yml (TechPowerUp.NVCleanstall).
      # Locate the exe — winget drops it under user-scope %LOCALAPPDATA% by default,
      # but with --scope machine it lands under Program Files. Probe both.
      $candidates = @(
        "$env:LOCALAPPDATA\Programs\NVCleanstall\NVCleanstall.exe",
        "$env:ProgramFiles\NVCleanstall\NVCleanstall.exe",
        "${env:ProgramFiles(x86)}\NVCleanstall\NVCleanstall.exe"
      )
      $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
      if (-not $exe) { throw "NVCleanstall.exe not found — softwares_winget.yml didn't install TechPowerUp.NVCleanstall?" }
      # -clean: clean driver install
      # -nogfe: skip GeForce Experience
      # -notlm: skip telemetry
      # -nophysx: skip PhysX (lighter footprint; remove this flag if PhysX needed)
      $job = Start-Job -ScriptBlock {
        param($p)
        & $p -clean -nogfe -notlm -nophysx *>$null
        $LASTEXITCODE
      } -ArgumentList $exe
      if (-not (Wait-Job $job -Timeout 1800)) {
        Stop-Job $job; Remove-Job $job -Force
        throw "NVCleanstall driver install timed out after 30 minutes"
      }
      $exitCode = Receive-Job $job
      Remove-Job $job
      if ($exitCode -ne 0) { throw "NVCleanstall exited $exitCode" }
      $Ansible.Changed = $true
  register: nvidia_install_result
  when:
    - nvidia_driver_install_strategy == 'nvcleanstall'
    - not (nvidia_check.result.present | default(false))

- name: NVIDIA — install driver via direct URL (one-shot)
  block:
    - name: Download NVIDIA driver installer
      ansible.windows.win_get_url:
        url: "{{ nvidia_driver_url }}"
        dest: 'C:\Windows\Temp\nvidia-driver.exe'
    - name: Run NVIDIA installer silently
      ansible.windows.win_command:
        cmd: 'C:\Windows\Temp\nvidia-driver.exe -s -clean'
      register: nvidia_directurl_install
  when:
    - nvidia_driver_install_strategy == 'direct_url'
    - not (nvidia_check.result.present | default(false))
    - nvidia_driver_url | length > 0

- name: Flag reboot after NVIDIA install
  ansible.builtin.set_fact:
    reboot_required: true
  when: >
    (nvidia_install_result.changed | default(false)) or
    (nvidia_directurl_install.changed | default(false))

# ======================== §4.4.3 NVIDIA telemetry cleanup ========================

- name: NVIDIA — disable telemetry services
  ansible.windows.win_service:
    name: "{{ item }}"
    start_mode: disabled
    state: stopped
  loop:
    - NvTelemetryContainer
    - NvContainerLocalSystem
    - NvContainerNetworkService
    - NVDisplay.ContainerLocalSystem
  failed_when: false
  when: nvidia_telemetry_cleanup | bool

- name: NVIDIA — remove telemetry crash report scheduled task
  community.windows.win_scheduled_task:
    name: NvTmRep_CrashReport
    state: absent
  failed_when: false
  when: nvidia_telemetry_cleanup | bool

# ======================== §4.4.4 Power plan ========================
# Set AFTER the AMD chipset install, because the chipset package is what
# ships the `AMD Ryzen Balanced` plan — running this earlier would force
# a 2-run convergence on fresh provisions.
# AMD Ryzen Balanced is recommended over High Performance for 9800X3D
# (Tom's Hardware + AMD guidance 2026) — High Performance breaks the
# X3D cache-aware boost behavior.

# ======================== MSI Afterburner — auto-start ========================

- name: Afterburner — start with Windows
  ansible.windows.win_powershell:
    script: |
      $exe = "${env:ProgramFiles(x86)}\MSI Afterburner\MSIAfterburner.exe"
      if (-not (Test-Path $exe)) {
        $Ansible.Changed = $false
        $Ansible.Result = "MSI Afterburner not installed — skipping"
        return
      }
      $regPath = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run'
      $current = (Get-ItemProperty $regPath -Name 'MSI Afterburner' -ErrorAction SilentlyContinue).'MSI Afterburner'
      if ($current -eq $exe) {
        $Ansible.Changed = $false
      } else {
        Set-ItemProperty $regPath -Name 'MSI Afterburner' -Value $exe
        $Ansible.Changed = $true
      }
  when: inventory_hostname == "aurelien-gaming"

# ======================== Power plan ========================

- name: Power plan — set Balanced
  community.windows.win_power_plan:
    name: Balanced
  when: inventory_hostname == "aurelien-gaming"
