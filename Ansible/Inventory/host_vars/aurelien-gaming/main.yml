user_name: "Aurel"

# Root user directory on M:\ — consumed by main.yml task name and by
# templates/synology_config_win.json.j2 (Synology Drive sync target).
root_user_directory: 'M:\Aurel'

# --- User Shell Folders redirections (user_folders.yml) ---
# Only the 8 folders actually redirected by the rewritten user_folders.yml
# are listed here. Legacy IE/Win9x folders (Cookies, History, Templates,
# NetHood, etc.) stay on C:\ — they break apps that hardcode
# %USERPROFILE%\AppData when moved.

desktop_user_directory_reg_key_name: "Desktop"
desktop_user_directory: 'M:\Aurel\Desktop'

documents_user_directory_reg_key_name: "Personal"
documents_user_directory: 'M:\Aurel\Documents'

downloads_user_directory_reg_key_name: "{374DE290-123F-4565-9164-39C4925E467B}"
downloads_user_directory: 'M:\Aurel\Downloads'

myMusic_user_directory_reg_key_name: "My Music"
myMusic_user_directory: 'M:\Aurel\Music'

myPictures_user_directory_reg_key_name: "My Pictures"
myPictures_user_directory: 'M:\Aurel\Pictures'

myVideos_user_directory_reg_key_name: "My Video"
myVideos_user_directory: 'M:\Aurel\Videos'

savedGames_user_directory_reg_key_name: "{4C5C32FF-BB9D-43B0-B5B4-2D72E54EAAA4}"
savedGames_user_directory: 'M:\Saved Games'

favorites_user_directory_reg_key_name: "Favorites"
favorites_user_directory: 'M:\Aurel\Favorites'

aurel_gaming_computer_hostname: "Aurel-Gaming"
games_directory: 'M:\Games'

## MS Store Apps
XboxAccessoires_id: "9NBLGGH30XJ3"

#SynologyDrive Variables
nas_url: "nas.eonelia.cloud"

# ============================================================================
# Hardware-specific vars for aurelien-gaming
# Generic Win11 gaming optim vars are in group_vars/windows_hosts/main.yml
# (Phase 0 refactor — see docs/superpowers/specs/2026-05-14-windows-gaming-role-cleanup-design.md)
# ============================================================================

# --- Storage & power (gaming_optim.yml) — sized for 32 GB RAM bare metal ---
hibernation_enabled: false
page_file:
  strategy: fixed # fixed | system_managed
  initial_size_mb: 32768
  max_size_mb: 49152
usb_selective_suspend: false
pcie_link_state_power_off: true

# --- Drivers (drivers.yml) — bare metal only ---
amd_chipset_install: true
nvidia_driver_install_strategy: winget # winget | direct_url | skip (Phase 3 winget only)
# Used only when nvidia_driver_install_strategy == "direct_url"
nvidia_driver_url: ""
nvidia_driver_version: ""

# --- NAS mapped drives (system_settings.yml — bare metal only) ---
# SMB direct LAN. nas_url doit résoudre vers une IP LAN (split-horizon DNS ou
# hosts entry) sinon Windows tentera SMB over WAN (typiquement bloqué).
nas_mapped_drives:
  - letter: W
    path: Aurelien
  - letter: V
    path: Apps
