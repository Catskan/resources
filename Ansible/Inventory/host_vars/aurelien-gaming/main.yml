user_name: "Aurel"

# Root user directory on M:\ — consumed by main.yml task name and by
# templates/synology_config_win.json.j2 (Synology Drive sync target).
root_user_directory: 'M:\Aurel'

# --- User Shell Folders redirections (user_folders.yml) ---
# Only the 8 folders actually redirected by the rewritten user_folders.yml
# are listed here. Legacy IE/Win9x folders (Cookies, History, Templates,
# NetHood, etc.) stay on C:\ — they break apps that hardcode
# %USERPROFILE%\AppData when moved.

desktop_user_directory_reg_key_name: "Desktop"
desktop_user_directory: 'M:\Aurel\Desktop'

documents_user_directory_reg_key_name: "Personal"
documents_user_directory: 'M:\Aurel\Documents'

downloads_user_directory_reg_key_name: "{374DE290-123F-4565-9164-39C4925E467B}"
downloads_user_directory: 'M:\Aurel\Downloads'

myMusic_user_directory_reg_key_name: "My Music"
myMusic_user_directory: 'M:\Aurel\Music'

myPictures_user_directory_reg_key_name: "My Pictures"
myPictures_user_directory: 'M:\Aurel\Pictures'

myVideos_user_directory_reg_key_name: "My Video"
myVideos_user_directory: 'M:\Aurel\Videos'

savedGames_user_directory_reg_key_name: "{4C5C32FF-BB9D-43B0-B5B4-2D72E54EAAA4}"
savedGames_user_directory: 'M:\Saved Games'

favorites_user_directory_reg_key_name: "Favorites"
favorites_user_directory: 'M:\Aurel\Favorites'

aurel_gaming_computer_hostname: "Aurel-Gaming"

#SynologyDrive Variables
# Local LAN IP (static via DHCP reservation on the NAS). We don't go
# through nas.eonelia.cloud here because that DNS would resolve to a WAN
# IP and Windows would try SMB over the internet (blocked by every
# residential ISP). Direct LAN IP gives the fastest SMB path.
nas_url: "192.168.1.7"

# ============================================================================
# Hardware-specific vars for aurelien-gaming
# Generic Win11 gaming optim vars are in group_vars/windows_hosts/main.yml
# (Phase 0 refactor — see docs/superpowers/specs/2026-05-14-windows-gaming-role-cleanup-design.md)
# ============================================================================

# --- Storage & power (gaming_optim.yml) — sized for 32 GB RAM bare metal ---
hibernation_enabled: false
page_file:
  strategy: fixed # fixed | system_managed
  initial_size_mb: 32768
  max_size_mb: 49152
usb_selective_suspend: false
pcie_link_state_power_off: true

# --- Drivers (drivers.yml) — bare metal only ---
# AMD chipset is NOT in the winget catalog (verified 2026-05-15), so we
# pull it from amd.com directly. URL must point to the silent-installer
# AMD Chipset Software bundle. Bump amd_chipset_url whenever AMD ships a
# refresh — the current 6.x line covers 9800X3D v-cache scheduling.
amd_chipset_install: true
amd_chipset_url: "https://drivers.amd.com/drivers/amd_chipset_software_8.05.04.516.exe"

# NVIDIA strategy: nvcleanstall (default, recommended), direct_url, or skip.
# - nvcleanstall : assumes TechPowerUp.NVCleanstall is installed via
#   softwares_winget.yml; drivers.yml invokes its CLI to clean-install
#   the latest driver without GeForce Experience or telemetry.
# - direct_url   : download from nvidia_driver_url + silent install
#                  (fallback if NVCleanstall ever breaks).
# - skip         : no-op.
nvidia_driver_install_strategy: nvcleanstall
nvidia_driver_url: "" # only consumed when strategy == 'direct_url'

# --- NAS mapped drives (system_settings.yml — bare metal only) ---
# Uses the LAN IP defined above. Both shares live on the same NAS so the
# Credential Manager entry (keyed on nas_url) covers both.
nas_mapped_drives:
  - letter: W
    path: Aurelien
  - letter: V
    path: Apps

# --- KeePassXC central vault (keepassxc_setup.yml) ---
# UNC path consumed by keepassxc.ini → KeePassXC opens the kdbx directly
# from the NAS (no local copy, NAS stays single source of truth across
# the Mac controller + Windows desktop). The `home` share is the
# Synology User Home Service mirror of /Volumes/home/ on macOS.
keepassxc_vault_unc: '\\{{ nas_url }}\home\Drive\Vault\Aurel-Vault.kdbx'

# --- OpenRGB profile (openrgb_setup.yml) ---
# The ASUS B850 Aura USB controller reports "Saving Not Supported" — it keeps
# NO state in hardware, so OpenRGB must re-apply a saved profile at every
# login. The profile is saved once in the OpenRGB UI (Save Profile) under this
# exact name; the startup shortcut then launches `--profile <name>`.
#
# Two RGB devices are controlled:
#   1) "ASUS B850 MAX GAMING WIFI W" (Aura via USB HID 0B05:19AF) — zones:
#        Aura Addressable 1 = Bykski CPU waterblock
#        Aura Addressable 2 = 3× Thermalright fans (resize to 50 LEDs)
#        Aura Addressable 3 = unused (nothing wired)
#   2) "Sapphire Radeon RX 9070 XT Nitro+" (native GPU ARGB, I2C ADL @ 0x28)
# The .orp profile stores zone sizes + colors for BOTH devices.
#
# ⚠️ Never use OpenRGB "Rescan Devices": it wedges the GPU I2C bus and the GPU
# vanishes until a full reboot. To re-detect, reboot (or close/relaunch OpenRGB).
# Leave openrgb_profile empty to fall back to plain --startminimized.
openrgb_profile: "rainbow"
