# Secrets résolus depuis KeePass à l'exécution.
# Les paths ci-dessous sont des exemples — adapte-les aux entrées réelles de
# ton Aurel-vault.kdbx (utilise les entrées existantes Microsoft/Ubisoft/NAS
# plutôt que d'en créer des doublons).

# Compte local Windows "Aurel" — propre à l'infra Ansible, à créer
remote_local_user_name_password: "{{ lookup('viczem.keepass.keepass', 'Local/Aurel-Gaming', 'password') }}"

# Compte Microsoft — entrée existante, adapte le path
microsoft_account_email: "{{ lookup('viczem.keepass.keepass', 'Microsoft Account', 'username') }}"
microsoft_account_password: "{{ lookup('viczem.keepass.keepass', 'Microsoft Account', 'password') }}"

# Ubisoft Connect — entrée existante
ubisoft_connect_username: "{{ lookup('viczem.keepass.keepass', 'Uplay (Ubisoft)', 'username') }}"
ubisoft_connect_password: "{{ lookup('viczem.keepass.keepass', 'Uplay (Ubisoft)', 'password') }}"

# NAS Synology — entrée existante
nas_username: "{{ lookup('viczem.keepass.keepass', 'Nas', 'username') }}"
nas_password: "{{ lookup('viczem.keepass.keepass', 'Nas', 'password') }}"

# Remote access — Sunshine Web UI admin (à créer dans KeePass)
sunshine_admin_user: "{{ lookup('viczem.keepass.keepass', 'Local/Sunshine', 'username') }}"
sunshine_admin_password: "{{ lookup('viczem.keepass.keepass', 'Local/Sunshine', 'password') }}"

# Remote access — RustDesk permanent password (à créer dans KeePass — password only, pas d'username)
rustdesk_permanent_password: "{{ lookup('viczem.keepass.keepass', 'Local/RustDesk', 'password') }}"
